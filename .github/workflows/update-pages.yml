name: Update GitHub Pages on Release

on:
  release:
    types: [published]

jobs:
  update-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version from release tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version extracted: $VERSION"

      - name: Get APK size from release
        id: apk_size
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SIZE_BYTES=$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[] | select(.name | test("(?i)deliours\\.apk$")) | .size')
          if [ -n "$SIZE_BYTES" ]; then
            SIZE_MB=$(echo "scale=0; $SIZE_BYTES / 1048576" | bc)
            echo "SIZE=${SIZE_MB} MB" >> "$GITHUB_OUTPUT"
          else
            echo "SIZE=~100 MB" >> "$GITHUB_OUTPUT"
          fi

      - name: Update latest-version.json
        run: |
          jq -n --arg v "${{ steps.version.outputs.VERSION }}" \
            '{version: $v, apkUrl: "https://github.com/Jason59000/Deliours-app/releases/latest/download/DeliOurs.apk"}' \
            > latest-version.json
          cat latest-version.json

      - name: Update index.html
        run: |
          DATE=$(date +"%d/%m/%Y")
          VERSION="${{ steps.version.outputs.VERSION }}"
          SIZE="${{ steps.apk_size.outputs.SIZE }}"
          sed -i "s/Version [0-9]\+\.[0-9]\+\.[0-9]\+/Version ${VERSION}/" index.html
          sed -i "s/Taille: [^•]*/Taille: ${SIZE} /" index.html
          sed -i "s|Dernière mise à jour: [0-9]\{2\}/[0-9]\{2\}/[0-9]\{4\}|Dernière mise à jour: ${DATE}|" index.html
          echo "index.html updated:"
          grep "version-info" index.html

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add latest-version.json index.html
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update pages to v${{ steps.version.outputs.VERSION }}"
          git push
